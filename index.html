<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysikSim – Interaktive Physik-Simulationen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PhysikSim</h1>
    <p class="subtitle">Interaktive Simulationen zu Physikexperimenten</p>
  </header>

  <main id="content"></main>

  <footer>
    <p>PhysikSim – Interaktive Physik-Simulationen</p>
  </footer>

  <script>
    /*
     * Dynamische Übersichtsseite
     * Simulationen werden aus simulations.json geladen.
     * Diese Datei wird automatisch per generate-manifest.sh erzeugt.
     *
     * Um eine neue Simulation hinzuzufügen:
     * 1. Neuen Ordner unter simulations/ anlegen (index.html, simulation.js, style.css)
     * 2. meta.json im Ordner erstellen mit: category, categoryIcon, categoryColor, order, title, description, experiments
     * 3. generate-manifest.sh ausführen (passiert automatisch beim Commit)
     */

    fetch('simulations.json')
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<p style="text-align:center;padding:2rem;color:#666">Simulationen konnten nicht geladen werden.</p>';
      });

    function render(simulations) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      // Nach Kategorie gruppieren
      const categoryMap = new Map();
      simulations.forEach(sim => {
        const key = sim.category;
        if (!categoryMap.has(key)) {
          categoryMap.set(key, {
            name: sim.category,
            icon: sim.categoryIcon,
            color: sim.categoryColor,
            simulations: []
          });
        }
        categoryMap.get(key).simulations.push(sim);
      });

      // Simulationen innerhalb jeder Kategorie nach order sortieren
      categoryMap.forEach(cat => {
        cat.simulations.sort((a, b) => a.order - b.order);
      });

      // Kategorien alphabetisch nach erstem Simulationstitel sortieren
      const categories = [...categoryMap.values()].sort((a, b) => {
        const aTitle = a.simulations[0]?.title || '';
        const bTitle = b.simulations[0]?.title || '';
        return aTitle.localeCompare(bTitle, 'de');
      });

      categories.forEach(cat => {
        if (cat.simulations.length === 0) return;

        const section = document.createElement('section');
        section.className = 'category';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <span class="category-icon" style="background:${cat.color}">${cat.icon}</span>
          <h2>${cat.name}</h2>
        `;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'sim-grid';

        cat.simulations.forEach(sim => {
          const card = document.createElement('a');
          card.href = sim.path;
          card.className = 'sim-card';
          card.innerHTML = `
            <div class="sim-card-accent" style="background:${cat.color}"></div>
            <div class="sim-card-body">
              <h3>${sim.title}</h3>
              <p>${sim.description}</p>
              <span class="sim-badge">${sim.experiments} Experiment${sim.experiments !== 1 ? 'e' : ''}</span>
            </div>
          `;
          grid.appendChild(card);
        });

        section.appendChild(grid);
        content.appendChild(section);
      });
    }
  </script>
</body>
</html>
