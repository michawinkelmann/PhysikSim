<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>PhysikSim‑Lab – Simulationen</title>
  <link rel="stylesheet" href="site.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">PhysikSim‑Lab</div>
      <div class="muted small">Offline‑fähige Physik‑Simulationen (Schule)</div>
    </div>
    <div class="actions">
      <button class="btn" id="resetFiltersBtn" aria-label="Filter zurücksetzen">Filter zurücksetzen</button>
    </div>
  </header>

  <main class="container">
    <section class="controls card soft" aria-label="Suche und Filter">
      <div class="controlsGrid">
        <div class="field">
          <label for="searchInput">Suche</label>
          <input id="searchInput" type="search" inputmode="search"
                 placeholder="Titel, Tags, Stichworte …" aria-label="Suche nach Titel oder Tags"/>
        </div>

        <div class="field">
          <label for="topicSelect">Thema</label>
          <select id="topicSelect" aria-label="Themenfilter">
            <!-- filled by JS -->
          </select>
        </div>

        <div class="field">
          <label for="sortSelect">Sortierung</label>
          <select id="sortSelect" aria-label="Sortierung auswählen">
            <option value="topic">Thema → Titel</option>
            <option value="title">Titel A–Z</option>
            <option value="grade">Klasse</option>
          </select>
        </div>
      </div>

      <div class="chips" id="topicChips" aria-label="Themen‑Chips">
        <!-- filled by JS -->
      </div>

      <div class="muted small" id="resultMeta" aria-live="polite"></div>
    </section>

    <section id="cards" class="cards" aria-label="Simulationen">
      <!-- cards rendered by JS -->
    </section>
  </main>

  <script src="site.js"></script>
</body>
</html>
